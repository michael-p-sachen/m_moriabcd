# Don't change the line below!
#! oxygen_storefront_id: 1000012976

name: Storefront 1000012976
on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Inspect dist/ before upload
        run: |
          echo "== dist =="
          ls -la dist/ || true
          echo "== dist/worker =="
          ls -la dist/worker/ || true
          echo "== dist/client (top-level) =="
          ls -la dist/client/ || true
          echo "== dist/client/covers =="
          ls -la dist/client/covers/ 2>/dev/null | head -5 || echo "(missing)"
          echo "== dist/client/assets =="
          ls -la dist/client/assets/ 2>/dev/null || echo "(missing)"
          echo "== dist/client/favicon.png =="
          ls -la dist/client/favicon.png 2>/dev/null || echo "(missing)"

      - name: Publish to Oxygen
        uses: shopify/oxygenctl-action@v4
        with:
          oxygen_deployment_token: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000012976 }}
          # No build_command — we already built above so dist/ has everything.
          # (The action runs whatever's in build_command; passing empty is invalid,
          # so just run a no-op echo.)
          build_command: 'echo already built'
