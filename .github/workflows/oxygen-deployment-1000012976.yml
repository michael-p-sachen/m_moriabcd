# Don't change the line below!
#! oxygen_storefront_id: 1000012976

name: Storefront 1000012976
on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (Vite SPA → prepare → Hydrogen worker)
        run: npm run build

      - name: List dist/ (debug)
        run: |
          echo "== dist/ =="
          ls -la dist/ || true
          echo "== dist/client/ =="
          ls -la dist/client/ || true
          echo "== dist/worker/ =="
          ls -la dist/worker/ || true

      - name: Deploy to Oxygen (modern CLI)
        # `npx shopify hydrogen deploy` would resolve to our pinned @shopify/cli-hydrogen 5.1.0
        # which doesn't have the `deploy` subcommand — that landed in v7+. Force latest.
        run: npx -y @shopify/cli@latest hydrogen deploy --no-build
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000012976 }}
